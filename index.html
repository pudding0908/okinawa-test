                    <a id="edit-sheet-btn" href="https://docs.google.com/spreadsheets/d/1H0pLIy9Cg1cMI673vZprheKm-DB6DisVU3U-24Q4Z7Y/edit?gid=398563289#gid=398563289" target="_blank" class="inline-block w-full bg-fuji-accent text-white text-xs font-bold py-2.5 rounded-lg shadow-md hover:bg-opacity-90 transition-all"><i class="fa-solid fa-pen-to-square mr-1"></i>呼叫 Google 試算表線上編輯</a>

        <nav class="fixed bottom-0 left-1/2 -translate-x-1/2 w-full max-w-md bg-fuji-paper/95 backdrop-blur-md border-t border-fuji-light flex justify-around items-center py-1.5 z-50 shadow-lg rounded-t-xl px-1">
            <button onclick="switchTab('plan')" id="nav-plan" class="nav-btn flex flex-col items-center text-fuji-primary transition-all"><i class="fa-solid fa-compass text-sm"></i><span class="text-[9px] font-bold mt-0.5">行程</span></button>
            <button onclick="switchTab('guide')" id="nav-guide" class="nav-btn flex flex-col items-center text-fuji-secondary transition-all"><i class="fa-solid fa-map-location-dot text-sm"></i><span class="text-[9px] font-bold mt-0.5">地圖</span></button>
            <button onclick="switchTab('shopping')" id="nav-shopping" class="nav-btn flex flex-col items-center text-fuji-secondary transition-all"><i class="fa-solid fa-cart-shopping text-sm"></i><span class="text-[9px] font-bold mt-0.5">購物</span></button>
            <button onclick="switchTab('wallet')" id="nav-wallet" class="nav-btn flex flex-col items-center text-fuji-secondary transition-all"><i class="fa-solid fa-wallet text-sm"></i><span class="text-[9px] font-bold mt-0.5">錢包</span></button>
            <button onclick="switchTab('lists')" id="nav-lists" class="nav-btn flex flex-col items-center text-fuji-secondary transition-all"><i class="fa-solid fa-check-square text-sm"></i><span class="text-[9px] font-bold mt-0.5">準備</span></button>
            <button onclick="switchTab('info')" id="nav-info" class="nav-btn flex flex-col items-center text-fuji-secondary transition-all"><i class="fa-solid fa-circle-info text-sm"></i><span class="text-[9px] font-bold mt-0.5">資訊</span></button>
        </nav>

    <script>
        // 全域參數配置 (維持原始不變)
        const SHEET_ID = '1H0pLIy9Cg1cMI673vZprheKm-DB6DisVU3U-24Q4Z7Y';
        const SHEET_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv`;
        const SHOPPING_CSV_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=%E8%B3%BC%E7%89%A9`;
        const SHEET_EDIT_URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/edit?gid=0#gid=0`;

        // GAS 表單實體接收網址
        const GAS_WEB_APP_URL = 'https://script.google.com/macros/s/AKfycbzgMLJsLB5NSEL3r0t4_ge0QA-mYjQ1_NBI_hntFYsTVWJco9zi7IJsBXzPwC6g5A7Jkg/exec';

        let cloudShoppingItems = [];
        let currentPostType = 'local'; 
        let walletCollapsedDays = {};
        
        // 【新增全域變數】管理購物分頁中店家的收合狀態紀錄
        let shoppingCollapsedStores = {};

        // 頁面初始化生命週期
        document.addEventListener('DOMContentLoaded', () => {
            const editBtn = document.getElementById('edit-sheet-btn');
            if (editBtn) editBtn.href = SHEET_EDIT_URL;
            fetchBotExchangeRate(); // 呼叫即時台銀匯率API
            fetchTravelPlan();
            fetchCloudShopping();
            initChecklist();
            initWalletDateTime();
            renderExpenses();
            initCalc();
        });

        // 串接外部 API 異步取得即時台銀日幣匯率資料 (維持原本設計)
        async function fetchBotExchangeRate() {
            try {
                const res = await fetch('https://open.er-api.com/v6/latest/JPY');
                if (!res.ok) throw new Error();
                const data = await res.json();
                const twdRate = data.rates.TWD;
                if (twdRate) {
                    const finalRate = parseFloat(twdRate).toFixed(4);
                    const rateInput = document.getElementById('exchange-rate');
                    if(rateInput) {
                        rateInput.value = (parseFloat(finalRate)).toFixed(3);
                        const tag = document.getElementById('bot-rate-tag');
                        if (tag) tag.classList.remove('hidden');
                        renderExpenses();
                    }
                }
            } catch (e) {
                console.log("無法取得台銀即時匯率，將自動啟用手動預設值 0.215");
            }
        }

        // 處理小帳本手風琴選單切換開關 (維持原本互斥邏輯)
        function toggleSection(contentId, arrowId) {
            const content = document.getElementById(contentId);
            const arrow = document.getElementById(arrowId);
            const isForm = contentId === 'sec-form-content';
            
            if (content.classList.contains('hidden')) {
                if(contentId === 'sec-rate-content') {
                    document.getElementById('sec-form-content').classList.add('hidden');
                    document.getElementById('sec-form-arrow').className = "fa-solid fa-plus text-[10px] ml-1";
                } else {
                    document.getElementById('sec-rate-content').classList.add('hidden');
                    document.getElementById('sec-rate-arrow').className = "fa-solid fa-chevron-right text-[10px] ml-1 transition-transform";
                }
                
                content.classList.remove('hidden');
                if(isForm) {
                    arrow.className = "fa-solid fa-minus text-[10px] ml-1";
                } else {
                    arrow.classList.add('rotate-90');
                }
            } else {
                content.classList.add('hidden');
                if(isForm) {
                    arrow.className = "fa-solid fa-plus text-[10px] ml-1";
                } else {
                    arrow.classList.remove('rotate-90');
                }
            }
        }

        // 錢包日期群組收合切換
        function toggleDayCollapse(dateStr) {
            walletCollapsedDays[dateStr] = !walletCollapsedDays[dateStr];
            renderExpenses();
        }

        // 【新增函數】控制購物店家的收合狀態切換
        function toggleStoreCollapse(storeName) {
            if (shoppingCollapsedStores[storeName] === undefined) {
                shoppingCollapsedStores[storeName] = false; // 點擊切換為展開
            } else {
                shoppingCollapsedStores[storeName] = !shoppingCollapsedStores[storeName];
            }
            renderCombinedShoppingList();
        }

        // 下載並解析試算表行事曆 CSV (維持原本架構)
        async function fetchTravelPlan() {
            try {
                const response = await fetch(SHEET_CSV_URL);
                const csvText = await response.text();
                parseAndRenderCSV(csvText);
                document.getElementById('loading-status').classList.add('hidden');
            } catch (error) { console.error(error); }
        }

        // 完美解析標準 CSV（包含雙引號內逗號與多行文字過濾過濾處理）
        function parseAndRenderCSV(csvText) {
            const lines = csvText.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0);
            if(lines.length <= 1) return;
            const headers = lines[0].split(',').map(h => h.replace(/["']/g, '').trim());
            document.getElementById('day-d1').innerHTML = '';
            document.getElementById('day-d2').innerHTML = '';
            document.getElementById('day-d3').innerHTML = '';
            document.getElementById('day-d4').innerHTML = '';

            for (let i = 1; i < lines.length; i++) {
                const currentLine = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/["']/g, '').trim());
                if(currentLine.length < headers.length) continue;
                let row = {};
                headers.forEach((header, index) => { row[header] = currentLine[index]; });
                if(!row['標題'] && !row['時間起']) continue;
                renderTimelineCard(row);
            }
        }

        // 行程卡片 UI 自動化渲染建構子
        function renderTimelineCard(row) {
            let dayValue = (row['Day'] || '').trim().toLowerCase(); 
            if (dayValue.startsWith('d')) { dayValue = 'd' + dayValue.replace(/[^0-9]/g, ''); }
            const containerId = `day-${dayValue}`;
            const targetContainer = document.getElementById(containerId);
            if (!targetContainer) return;

            let timeString = row['時間起'] || '';
            if (row['時間迄']) { timeString += ` - ${row['時間迄']}`; }

            let buttonHtml = '';
            if (row['Google Map']) buttonHtml += `<a href="${row['Google Map']}" target="_blank" class="text-[10px] bg-fuji-bg font-bold px-2 py-0.5 rounded-full text-fuji-primary border border-fuji-light mr-1 inline-flex items-center gap-0.5"><i class="fa-solid fa-location-dot text-fuji-accent"></i>導航</a>`;
            if (row['網頁']) buttonHtml += `<a href="${row['網頁']}" target="_blank" class="text-[10px] bg-fuji-bg font-bold px-2 py-0.5 rounded-full text-fuji-primary border border-fuji-light mr-1 inline-flex items-center gap-0.5"><i class="fa-solid fa-earth-asia"></i>網站</a>`;

            let metaHtml = '';
            if (row['區間費用']) metaHtml += `<span class="inline-block bg-fuji-light text-fuji-primary text-[9px] font-bold px-1.5 py-0.5 rounded mr-1">💰 ${row['區間費用']}</span>`;
            if (row['備註']) metaHtml += `<span class="text-[10px] text-fuji-accent font-bold">💬 ${row['備註']}</span>`;

            let cardHtml = `<div class="bg-fuji-paper p-3 rounded-xl shadow-sm border border-fuji-light"><div class="flex justify-between items-center text-[11px] text-fuji-secondary font-bold mb-1"><span class="text-fuji-primary bg-fuji-light px-1.5 py-0.5 rounded-full">${timeString}</span>${row['分類'] ? `<span class="text-[9px] bg-fuji-bg px-1.5 py-0.5 rounded-full text-fuji-primary border border-fuji-light">${row['分類']}</span>` : ''}</div><h4 class="font-bold text-fuji-dark text-sm mt-1">${row['標題'] || '未命名行程'}</h4>${row['說明'] ? `<p class="text-xs text-fuji-secondary mt-1 text-justify leading-relaxed">${row['說明']}</p>` : ''}<div class="mt-2">${metaHtml}</div><div class="mt-2">${buttonHtml}</div></div>`;
            
            if (row['分類'] === '重要') {
                cardHtml = `<div class="bg-fuji-accent/10 border-l-4 border-fuji-accent p-3 rounded-xl shadow-sm bg-white"><div class="flex justify-between text-[11px] text-fuji-accent font-bold mb-1"><span class="bg-fuji-accent text-white px-1.5 py-0.5 rounded-full">${timeString}</span><span><i class="fa-solid fa-star fa-spin mr-1"></i>重要</span></div><p class="font-bold text-fuji-dark text-sm mt-1">${row['標題'] || '未命名行程'}</p>${row['說明'] ? `<p class="text-xs text-fuji-dark/80 mt-1 leading-relaxed bg-fuji-bg/50 p-2 rounded-lg text-justify">${row['說明']}</p>` : ''}<div class="mt-2">${metaHtml}</div><div class="mt-2">${buttonHtml}</div></div>`;
            }
            targetContainer.innerHTML += cardHtml;
        }

        // 【修改項目】店家 LOGO 前方改為抓取試算表中的 LOGO 圖片連結
        function getStoreMeta(storeName, logoUrl) {
            const name = (storeName || '').trim();
            // 若有自訂的 Google 試算表 LOGO 網址則優先採用，並防止損壞時顯示防錯機制
            if (logoUrl && (logoUrl.startsWith('http://') || logoUrl.startsWith('https://'))) {
                return { icon: `<img src="${logoUrl}" referrerpolicy="no-referrer" class="w-5 h-5 object-contain rounded-md border border-gray-100 shadow-2xs inline-block" alt="${name} logo" onerror="this.outerHTML='<i class=\'fa-solid fa-shop text-fuji-primary\'></i>';">` };
            }
            
            // 備用方案：若無則沿用原本分析大國藥妝、唐吉訶德、AEON 的專屬圖示
            let icon = '<i class="fa-solid fa-shop text-fuji-primary"></i>';
            if (name.includes('大國')) icon = '<span class="bg-orange-500 text-white font-extrabold text-[9px] px-1 py-0.5 rounded shadow-sm">大國</span>';
            else if (name.includes('唐吉') || name.includes('驚安') || name.includes('Donki')) icon = '<span class="bg-yellow-400 text-black font-extrabold text-[9px] px-1 py-0.5 rounded shadow-sm">🐧 DONKI</span>';
            else if (name.includes('AEON') || name.includes('永旺')) icon = '<span class="bg-purple-600 text-white font-extrabold text-[9px] px-1 py-0.5 rounded shadow-sm">AEON</span>';
            return { icon };
        }

        // 處理 Google 雲端硬碟圖片縮圖網址轉換 (維持原功能)
        function parseImageUrl(url) {
            if (!url) return '';
            let cleanUrl = url.trim();
            if (cleanUrl.includes('drive.google.com')) {
                const match = cleanUrl.match(/(?:\/d\/|id=)([a-zA-Z0-9_-]{25,35})/);
                if (match && match[1]) return `https://lh3.googleusercontent.com/d/${match[1]}`;
            }
            return cleanUrl;
        }

        // 非同步拉取雲端購物 CSV 清單並整合自訂 LOGO 欄位
        async function fetchCloudShopping() {
            try {
                const response = await fetch(SHOPPING_CSV_URL);
                if (!response.ok) throw new Error();
                const csvText = await response.text();
                const lines = csvText.split(/\r?\n/).map(line => line.trim()).filter(line => line.length > 0);
                cloudShoppingItems = [];
        
                if (lines.length > 1) {
                    const headers = lines[0].split(',').map(h => h.replace(/["']/g, '').trim());
                    for (let i = 1; i < lines.length; i++) {
                        const currentLine = lines[i].split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/).map(v => v.replace(/["']/g, '').trim());
                        if (currentLine.length < 3 || !currentLine[2]) continue;
                        cloudShoppingItems.push({
                            id: 'cloud-' + i, 
                            name: currentLine[2], 
                            qty: parseInt(currentLine[3]) || 1, 
                            store: currentLine[1] || '其他待辦', 
                            note: (currentLine[4] || '').substring(0, 40), 
                            link: currentLine[5] || '', 
                            image: parseImageUrl(currentLine[6]), 
                            storeLogo: currentLine[7] || '', // 【新增】讀取試算表第 8 欄 (Index 7) 店家LOGO網址
                            isCloud: true
                        });
                    }
                }
            } catch (error) { console.error("雲端讀取異常"); }
            renderCombinedShoppingList();
        }

        // 控制購物模式切換 (維持原樣式切換邏輯)
        function setPostType(type) {
            currentPostType = type;
            const localBtn = document.getElementById('toggle-type-local');
            const cloudBtn = document.getElementById('toggle-type-cloud');
            const submitBtn = document.getElementById('add-shop-btn');

            if (type === 'local') {
                localBtn.className = "px-2 py-0.5 rounded-md bg-white text-amber-600 shadow-2xs transition-all flex items-center gap-0.5";
                cloudBtn.className = "px-2 py-0.5 rounded-md text-fuji-secondary transition-all flex items-center gap-0.5";
                submitBtn.className = "w-full bg-amber-500 text-white text-xs font-bold py-2 rounded-lg shadow-md hover:bg-amber-600 transition-all";
                submitBtn.innerHTML = `<i class="fa-solid fa-plus mr-1"></i>存入手機私房清單`;
            } else {
                localBtn.className = "px-2 py-0.5 rounded-md text-fuji-secondary transition-all flex items-center gap-0.5";
                cloudBtn.className = "px-2 py-0.5 rounded-md bg-white text-fuji-primary shadow-2xs transition-all flex items-center gap-0.5";
                submitBtn.className = "w-full bg-fuji-primary text-white text-xs font-bold py-2 rounded-lg shadow-md hover:bg-fuji-dark transition-all";
                submitBtn.innerHTML = `<i class="fa-solid fa-cloud-arrow-up mr-1"></i>同步至團隊 Google 表單`;
            }
        }

        // 處理購物清單點擊送出作業
        function handleShoppingSubmit() {
            const name = document.getElementById('shop-item-name').value.trim();
            const qty = parseInt(document.getElementById('shop-item-qty').value) || 1;
            const store = document.getElementById('shop-item-store').value.trim() || (currentPostType === 'local' ? '個人私房購買' : '未分類商店');
            const noteOrImg = document.getElementById('shop-item-note').value.trim();

            if (!name) { alert('請填寫商品名稱唷！'); return; }

            if (currentPostType === 'local') {
                const localItems = JSON.parse(localStorage.getItem('ok_shopping_local')) || [];
                let finalImg = ''; let finalNote = noteOrImg;
                if (noteOrImg.startsWith('http://') || noteOrImg.startsWith('https://')) { finalImg = parseImageUrl(noteOrImg); finalNote = '私房附圖'; }
                localItems.push({ id: 'local-' + Date.now(), name, qty, store, note: finalNote, image: finalImg, storeLogo: '', isCloud: false });
                localStorage.setItem('ok_shopping_local', JSON.stringify(localItems));
                clearShoppingForm(); renderCombinedShoppingList();
            } else {
                if (!GAS_WEB_APP_URL || GAS_WEB_APP_URL.includes('請把')) { alert('尚未配置 GAS 網址。'); return; }
                const submitBtn = document.getElementById('add-shop-btn');
                submitBtn.disabled = true; submitBtn.innerHTML = `<i class="fa-solid fa-spinner fa-spin mr-1"></i>同步中...`;

                let finalNote = noteOrImg; let finalImage = '';
                if (noteOrImg.startsWith('http://') || noteOrImg.startsWith('https://')) { finalImage = noteOrImg; finalNote = '網頁附圖上傳'; }
                const payload = { store, name, qty, note: finalNote, link: '', image: finalImage };

                fetch(GAS_WEB_APP_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) })
                .then(() => {
                    alert(`🎉 【${name}】已成功同步至雲端！`);
                    clearShoppingForm(); setTimeout(fetchCloudShopping, 2000);
                }).catch(err => alert('發送失敗')).finally(() => { submitBtn.disabled = false; setPostType('cloud'); });
            }
        }

        function clearShoppingForm() {
            document.getElementById('shop-item-name').value = '';
            document.getElementById('shop-item-qty').value = '1';
            document.getElementById('shop-item-store').value = '';
            document.getElementById('shop-item-note').value = '';
        }

        // 【修改項目】購物清單渲染方法優化：包含預設收合、字體加大、顯眼刪除背景、已完成購買圖片自動消失
        function renderCombinedShoppingList() {
            const container = document.getElementById('shopping-list-container'); if (!container) return; container.innerHTML = '';
            const localItems = JSON.parse(localStorage.getItem('ok_shopping_local')) || [];
            const checkedIds = JSON.parse(localStorage.getItem('ok_shopping_checked_ids')) || [];
            const modifiedQtys = JSON.parse(localStorage.getItem('ok_shopping_qtys')) || {};
            const allItems = [...cloudShoppingItems, ...localItems];

            if (allItems.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-xs text-fuji-secondary font-medium">🛒 清單空空如也。</div>`; return;
            }

            // 店家資料分組
            const storeGroups = {};
            allItems.forEach(item => {
                const storeName = item.store || '其他待辦購買';
                if (!storeGroups[storeName]) {
                    storeGroups[storeName] = { items: [], logo: item.storeLogo || '' };
                }
                if (item.storeLogo && !storeGroups[storeName].logo) {
                    storeGroups[storeName].logo = item.storeLogo;
                }
                if (modifiedQtys[item.id] !== undefined) item.qty = modifiedQtys[item.id];
                storeGroups[storeName].items.push(item);
            });

            // 迴圈產生各店家區塊 HTML
            for (const [storeName, group] of Object.entries(storeGroups)) {
                const meta = getStoreMeta(storeName, group.logo);
                
                // 【修改 1】設定預設為關閉收合 (即 isStoreCollapsed = true)
                if (shoppingCollapsedStores[storeName] === undefined) {
                    shoppingCollapsedStores[storeName] = true;
                }
                const isStoreCollapsed = shoppingCollapsedStores[storeName];
                const storeArrow = isStoreCollapsed ? 'fa-chevron-right' : 'fa-chevron-down';

                // 【修改 2】將標題改為顯眼一點 (加大 text-[13px] 加粗 text-fuji-dark) 並附加點擊收合按鈕
                let groupHtml = `
                    <div class="bg-fuji-paper rounded-xl border border-fuji-light shadow-sm overflow-hidden bg-white">
                        <div onclick="toggleStoreCollapse('${storeName}')" class="bg-fuji-bg/90 active:bg-fuji-light/80 px-3 py-2.5 border-b border-fuji-light flex justify-between items-center cursor-pointer select-none">
                            <div class="flex items-center gap-2 font-bold text-sm text-fuji-dark tracking-wide">
                                ${meta.icon}
                                <span class="text-[13px] font-extrabold text-fuji-dark">${storeName}</span>
                            </div>
                            <div class="flex items-center gap-1.5 text-fuji-secondary text-[11px] font-bold">
                                <span class="bg-fuji-light text-fuji-primary px-1.5 py-0.2 rounded-full text-[10px]">${group.items.length}件</span>
                                <i class="fa-solid ${storeArrow} text-[10px] transition-transform"></i>
                            </div>
                        </div>
                        <div class="divide-y divide-fuji-light ${isStoreCollapsed ? 'hidden' : ''}">`;

                group.items.forEach(item => {
                    const isChecked = checkedIds.includes(item.id);
                    
                    // 【修改 3、4】點選完成購買：調整為更看得出差異的淡煙燻灰色背景 (bg-gray-100/80)，且字體加大至 text-[13px]
                    // 【修改 3】圖片檔自動消失限制：只要 isChecked 為 true，下方條件 `item.image && !isChecked` 將會自動隱藏圖片
                    groupHtml += `
                        <div class="p-3 flex flex-col gap-1.5 transition-all relative ${isChecked ? 'bg-gray-100/80' : ''}">
                            <div class="flex justify-between items-start gap-2">
                                <div class="flex-1 min-w-0 cursor-pointer" onclick="toggleShoppingCheck('${item.id}')">
                                    <div class="flex items-center gap-1 flex-wrap">
                                        <span class="font-bold text-[13px] select-none break-all ${isChecked ? 'line-through text-gray-400 font-normal' : 'text-fuji-dark'}">${item.name}</span>
                                        ${!item.isCloud ? `<span class="text-[8px] bg-amber-50 text-amber-600 font-bold px-1 rounded border border-amber-200">私人</span>` : ''}
                                    </div>
                                </div>
                                <div class="flex items-center gap-1 flex-shrink-0">
                                    <div class="flex items-center border border-fuji-light rounded-md bg-fuji-bg overflow-hidden shadow-2xs">
                                        <button onclick="adjustQty('${item.id}', -1)" class="px-1.5 py-0.5 text-fuji-primary text-xs font-bold"><i class="fa-solid fa-minus text-[9px]"></i></button>
                                        <span class="px-1 text-[13px] font-extrabold text-fuji-dark min-w-[14px] text-center select-none">${item.qty}</span>
                                        <button onclick="adjustQty('${item.id}', 1)" class="px-1.5 py-0.5 text-fuji-primary text-xs font-bold"><i class="fa-solid fa-plus text-[9px]"></i></button>
                                    </div>
                                    ${!item.isCloud ? `<button onclick="deleteLocalShoppingItem('${item.id}')" class="text-fuji-secondary hover:text-fuji-accent p-1 text-xs"><i class="fa-regular fa-trash-can text-[11px]"></i></button>` : '<div class="w-3"></div>'}
                                </div>
                            </div>
                            <div class="cursor-pointer" onclick="toggleShoppingCheck('${item.id}')">
                                ${item.note ? `<div class="text-[11px] ${isChecked ? 'text-gray-400' : 'text-fuji-secondary'} font-medium break-all"><i class="fa-regular fa-comment-dots mr-0.5"></i>${item.note}</div>` : ''}
                                ${item.link ? `<div class="mt-1"><a href="${item.link}" target="_blank" onclick="event.stopPropagation();" class="inline-flex items-center gap-0.5 text-[10px] font-bold text-fuji-primary bg-fuji-bg px-2 py-0.5 rounded-full border border-fuji-light shadow-2xs"><i class="fa-solid fa-arrow-up-right-from-square text-[7px]"></i> 連結</a></div>` : ''}
                                ${item.image && !isChecked ? `<div class="mt-1.5 w-full overflow-hidden rounded-lg border border-fuji-light bg-white max-h-48 flex items-center justify-center"><img src="${item.image}" referrerpolicy="no-referrer" class="w-full h-full object-contain max-h-48 p-1" alt="商品圖片" onerror="this.parentElement.style.display='none';"></div>` : ''}
                            </div>
                        </div>`;
                });
                groupHtml += `</div></div>`; container.innerHTML += groupHtml;
            }
        }

        function adjustQty(id, change) {
            const modifiedQtys = JSON.parse(localStorage.getItem('ok_shopping_qtys')) || {};
            let currentQty = 1;
            const item = [...cloudShoppingItems, ...(JSON.parse(localStorage.getItem('ok_shopping_local')) || [])].find(i => i.id === id);
            if (item) currentQty = modifiedQtys[id] !== undefined ? modifiedQtys[id] : item.qty;
            let newQty = currentQty + change; if (newQty < 1) newQty = 1;
            modifiedQtys[id] = newQty; localStorage.setItem('ok_shopping_qtys', JSON.stringify(modifiedQtys));
            renderCombinedShoppingList();
        }

        function toggleShoppingCheck(id) {
            let checkedIds = JSON.parse(localStorage.getItem('ok_shopping_checked_ids')) || [];
            if (checkedIds.includes(id)) checkedIds = checkedIds.filter(i => i !== id);
            else checkedIds.push(id);
            localStorage.setItem('ok_shopping_checked_ids', JSON.stringify(checkedIds));
            renderCombinedShoppingList();
        }

        function deleteLocalShoppingItem(id) {
            let localItems = JSON.parse(localStorage.getItem('ok_shopping_local')) || [];
            localItems = localItems.filter(item => item.id !== id);
            localStorage.setItem('ok_shopping_local', JSON.stringify(localItems));
            renderCombinedShoppingList();
        }

        function initWalletDateTime() {
            const now = new Date();
            const localDate = now.toISOString().split('T')[0];
            const localTime = now.toTimeString().split(' ')[0].substring(0, 5);
            document.getElementById('expense-date').value = localDate;
            document.getElementById('expense-time').value = localTime;
        }

        function toggleCardSelect() {
            const method = document.getElementById('expense-method').value;
            const cardSelect = document.getElementById('expense-card');
            if (method === '信用卡') {
                cardSelect.disabled = false;
                cardSelect.className = "px-1.5 py-1.5 border border-fuji-light rounded-lg text-xs bg-fuji-bg focus:outline-none text-fuji-dark opacity-100";
            } else {
                cardSelect.disabled = true; cardSelect.value = "";
                cardSelect.className = "px-1.5 py-1.5 border border-fuji-light rounded-lg text-xs bg-fuji-bg focus:outline-none text-fuji-secondary opacity-50";
            }
        }

        function addExpense() {
            const store = document.getElementById('expense-store').value.trim() || '未分類店家';
            const title = document.getElementById('expense-title').value.trim();
            const date = document.getElementById('expense-date').value;
            const time = document.getElementById('expense-time').value;
            const amount = parseFloat(document.getElementById('expense-amount').value);
            const currency = document.getElementById('expense-currency').value;
            const method = document.getElementById('expense-method').value;
            const card = document.getElementById('expense-card').value;
            const note = document.getElementById('expense-note').value.trim();

            if (!title) { alert('請填寫買了什麼唷！'); return; }
            if (isNaN(amount) || amount <= 0) { alert('請輸入消費金額！'); return; }
            if (!date || !time) { alert('請確認日期時間。'); return; }

            const expenses = JSON.parse(localStorage.getItem('ok_wallet_expenses_v3')) || [];
            expenses.push({ id: 'exp-' + Date.now(), store, title, date, time, amount, currency, method, card, note });
            localStorage.setItem('ok_wallet_expenses_v3', JSON.stringify(expenses));

            document.getElementById('expense-store').value = '';
            document.getElementById('expense-title').value = '';
            document.getElementById('expense-amount').value = '';
            document.getElementById('expense-note').value = '';
            initWalletDateTime();
            document.getElementById('expense-method').value = '日幣現金';
            toggleCardSelect();

            renderExpenses();
        }

        function deleteExpense(id) {
            if (confirm('確定要移除此筆開銷紀錄嗎？')) {
                let expenses = JSON.parse(localStorage.getItem('ok_wallet_expenses_v3')) || [];
                expenses = expenses.filter(exp => exp.id !== id);
                localStorage.setItem('ok_wallet_expenses_v3', JSON.stringify(expenses));
                renderExpenses();
            }
        }

        // 【修改項目】錢包分頁明細樣式排版優化：備註純文字化、支付方式套用黃色系框線背景
        function renderExpenses() {
            const container = document.getElementById('expense-list'); if (!container) return; container.innerHTML = '';
            const expenses = JSON.parse(localStorage.getItem('ok_wallet_expenses_v3')) || [];
            const rate = parseFloat(document.getElementById('exchange-rate').value) || 0.215;

            let totalJpy = 0; let totalTwd = 0;
            expenses.forEach(exp => {
                if (exp.currency === 'JPY') { totalJpy += exp.amount; totalTwd += exp.amount * rate; }
                else { totalTwd += exp.amount; totalJpy += exp.amount / rate; }
            });
            document.getElementById('total-jpy').innerHTML = `¥${Math.round(totalJpy).toLocaleString()}`;
            document.getElementById('total-twd').innerHTML = `NT$ ${Math.round(totalTwd).toLocaleString()}`;

            if (expenses.length === 0) {
                container.innerHTML = `<div class="text-center py-8 text-xs text-fuji-secondary font-medium">🪙 隨身小帳本尚無資料。<br>點擊上方快速記帳吧！</div>`; return;
            }

            expenses.sort((a, b) => {
                if (a.date !== b.date) return b.date.localeCompare(a.date);
                return b.time.localeCompare(a.time);
            });

            const dateGroups = {};
            expenses.forEach(exp => {
                if (!dateGroups[exp.date]) dateGroups[exp.date] = [];
                dateGroups[exp.date].push(exp);
            });

            for (const [date, items] of Object.entries(dateGroups)) {
                let dayTotalTwd = 0;
                items.forEach(item => {
                    if (item.currency === 'JPY') dayTotalTwd += item.amount * rate;
                    else dayTotalTwd += item.amount;
                });

                const isCollapsed = walletCollapsedDays[date] === true;
                const arrowIcon = isCollapsed ? 'fa-chevron-right' : 'fa-chevron-down';

                let groupHtml = `
                    <div class="space-y-1.5">
                        <div onclick="toggleDayCollapse('${date}')" class="text-xs font-bold text-white bg-fuji-primary rounded-xl px-2.5 py-1.5 flex items-center justify-between cursor-pointer select-none mt-2 shadow-2xs">
                            <div class="flex items-center gap-1">
                                <i class="fa-solid ${arrowIcon} text-fuji-light text-[10px] transition-transform"></i>
                                <span><i class="fa-regular fa-calendar-days text-[10px]"></i> ${date}</span>
                            </div>
                            <div class="text-[10px] bg-fuji-dark text-white px-2 py-0.5 rounded font-cute">
                                當天小計: NT$ ${Math.round(dayTotalTwd).toLocaleString()}
                            </div>
                        </div>
                        <div class="${isCollapsed ? 'hidden' : ''} bg-fuji-paper rounded-xl border border-fuji-light shadow-sm overflow-hidden divide-y divide-fuji-light bg-white">`;
                
                items.forEach(item => {
                    const isJpy = item.currency === 'JPY';
                    const displayAmt = isJpy ? `¥${item.amount.toLocaleString()}` : `$${item.amount.toLocaleString()}`;
                    const subAmt = isJpy ? `約 $${Math.round(item.amount * rate)}` : `約 ¥${Math.round(item.amount / rate)}`;

                    // 【修改 2】將明細中支付方式與卡片改用原備註黃色系顏色背景 (bg-amber-50 border-amber-200)
                    // 【修改 1】備註改為不須框線與背景之純文字，並與時間相同套用 text-fuji-secondary 顏色
                    groupHtml += `
                        <div class="p-3 flex justify-between items-center gap-2 hover:bg-fuji-bg/20 transition-all">
                            <div class="min-w-0 flex-1 space-y-1">
                                <div class="flex items-center gap-1.5 flex-wrap">
                                    <span class="text-[9px] bg-fuji-primary text-white px-1.5 py-0.5 rounded font-bold inline-flex items-center gap-0.5 flex-shrink-0">
                                        <i class="fa-solid fa-store text-[8px]"></i> ${item.store}
                                    </span>
                                    <span class="font-bold text-xs text-fuji-dark break-all">${item.title}</span>
                                </div>
                                
                                <div class="text-[10px] text-fuji-secondary font-medium flex items-center gap-1.5 flex-wrap">
                                    <span><i class="fa-regular fa-clock text-[9px]"></i> ${item.time}</span>
                                    <span>•</span>
                                    <span class="font-bold bg-amber-50 border border-amber-200 px-1.5 py-0.2 rounded text-amber-800 shadow-3xs text-[9px]">
                                        ${item.method}${item.card ? ` (${item.card})` : ''}
                                    </span>
                                </div>

                                ${item.note ? `<div class="text-[10px] text-fuji-secondary font-medium break-all pt-0.5"><i class="fa-regular fa-comment-dots mr-0.5"></i>備註：${item.note}</div>` : ''}
                            </div>
                            <div class="flex items-center gap-2 flex-shrink-0">
                                <div class="text-right">
                                    <div class="font-cute font-extrabold text-xs text-fuji-dark">${displayAmt}</div>
                                    <div class="text-[9px] text-fuji-secondary font-semibold">${subAmt}</div>
                                </div>
                                <button onclick="deleteExpense('${item.id}')" class="text-fuji-secondary hover:text-fuji-accent p-1.5 transition-all text-xs">
                                    <i class="fa-regular fa-trash-can text-[13px]"></i>
                                </button>
                            </div>
                        </div>`;
                });
                groupHtml += `</div></div>`; container.innerHTML += groupHtml;
            }
        }

        // 頁面主導覽分頁切換控制
        function switchTab(tabName) {
            document.querySelectorAll('.tab-content').forEach(el => el.classList.add('hidden'));
            document.getElementById(`page-${tabName}`).classList.remove('hidden');
            document.querySelectorAll('.nav-btn').forEach(btn => { btn.classList.remove('text-fuji-primary'); btn.classList.add('text-fuji-secondary'); });
            document.getElementById(`nav-${tabName}`).classList.remove('text-fuji-secondary'); document.getElementById(`nav-${tabName}`).classList.add('text-fuji-primary');
            if(tabName === 'shopping') fetchCloudShopping();
            if(tabName === 'wallet') renderExpenses();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // 行程天數子頁籤快速切換
        function switchDay(dayId) {
            document.querySelectorAll('.day-timeline').forEach(el => el.classList.add('hidden'));
            document.getElementById(`day-${dayId}`).classList.remove('hidden');
            document.querySelectorAll('.day-btn').forEach(btn => { btn.className = "day-btn px-2.5 py-1 bg-fuji-paper text-fuji-primary border border-fuji-light rounded-full shadow-sm"; });
            document.getElementById(`btn-${dayId}`).className = "day-btn px-2.5 py-1 bg-fuji-primary text-white rounded-full shadow-sm";
        }

        // 行前準備行李資料預設建構器
        function initChecklist() {
            const defaultChecklist = [
                { id: 1, text: "中華民國護照 (效期6個月以上)", checked: true },
                { id: 2, text: "日本上網卡 (eSIM / 實體卡)", checked: false },
                { id: 3, text: "日文駕照譯本 ＆ 台灣駕照正本", checked: false }
            ];
            if (!localStorage.getItem('ok_checklist')) localStorage.setItem('ok_checklist', JSON.stringify(defaultChecklist));
            renderChecklist(JSON.parse(localStorage.getItem('ok_checklist')));
        }

        function renderChecklist(items) {
            const container = document.getElementById('checklist-container'); if(!container) return; container.innerHTML = '';
            items.forEach(item => {
                container.innerHTML += `
                    <label class="flex items-start gap-2 text-xs text-fuji-dark font-medium py-0.5">
                        <input type="checkbox" ${item.checked ? 'checked' : ''} onchange="toggleCheck(${item.id})" class="mt-0.5 accent-fuji-primary h-3.5 w-3.5 rounded">
                        <span class="${item.checked ? 'line-through text-fuji-secondary font-normal' : 'font-bold text-fuji-dark'}">${item.text}</span>
                    </label>`;
            });
        }

        function toggleCheck(id) {
            let stored = JSON.parse(localStorage.getItem('ok_checklist'));
            stored = stored.map(i => i.id === id ? { ...i, checked: !i.checked } : i);
            localStorage.setItem('ok_checklist', JSON.stringify(stored));
            renderChecklist(stored);
        }

        // 隨身小帳本匯率快速輸入即時試算計算機 (防禦型 Function Sandbox Eval 設計)
        function initCalc() {
            const input = document.getElementById('calc-input'); if(!input) return;
            input.addEventListener('input', function() {
                const rate = parseFloat(document.getElementById('exchange-rate').value) || 0.215;
                try {
                    let sanitized = this.value.replace(/[^0-9+\-*/().]/g, '');
                    if(!sanitized) { document.getElementById('calc-jpy').innerText = '0'; document.getElementById('calc-twd').innerText = 'NT$ 0'; return; }
                    let jpy = Function('"use strict";return (' + sanitized + ')')() || 0;
                    jpy = Math.round(jpy); document.getElementById('calc-jpy').innerText = jpy;
                    document.getElementById('calc-twd').innerText = 'NT$ ' + Math.round(jpy * rate).toLocaleString();
                } catch(e) {}
            });
        }
    </script>
</body>
</html>
